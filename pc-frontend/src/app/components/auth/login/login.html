<div class="pc-auth-page">

  <a class="pc-auth-back" href="/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Home
  </a>

  <div class="pc-auth-card">

    <div class="pc-auth-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
      </svg>
    </div>

    <h1 class="pc-auth-title">{{ loginTitle }}</h1>
    <p class="pc-auth-sub">{{ loginSubtitle }}</p>

    @if (errorMessage) {
      <div class="pc-alert pc-alert-error">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="pc-form-group" style="margin-bottom:1rem">
        <label class="pc-label" for="email">Email Address</label>
        <input
          id="email"
          class="pc-input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="user@example.com"
          required
        />
        <span class="pc-hint">Example: john.doe&#64;email.com</span>
      </div>

      <div class="pc-form-group" style="margin-bottom:0.5rem">
        <label class="pc-label" for="password">Password</label>
        <input
          id="password"
          class="pc-input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          required
        />
      </div>

      <div class="pc-remember">
        <label>
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
          Remember me
        </label>
        <a class="pc-forgot" routerLink="/forgot-password">Forgot password?</a>
      </div>

      <button type="submit" class="pc-auth-submit" [disabled]="loading">
        @if (loading) { Signing in... } @else { Login }
      </button>
    </form>

    <div class="pc-auth-switch" style="margin-top:1.25rem">
      Don't have an account? <a routerLink="/register">Sign Up</a>
    </div>

    <hr class="pc-auth-hr" />
    <p class="pc-auth-or">Or continue with</p>
    <div id="google-signin-btn" style="display:flex;justify-content:center;margin-bottom:1rem"></div>
    <p class="pc-auth-or">Or login as:</p>
    <div class="pc-auth-role-grid">
      <button
        type="button"
        class="pc-auth-role-btn"
        [class.active-role]="loginMode === 'pharmacy'"
        (click)="setMode('pharmacy')"
      >Pharmacy</button>
      <button
        type="button"
        class="pc-auth-role-btn"
        [class.active-role]="loginMode === 'admin'"
        (click)="setMode('admin')"
      >Admin</button>
    </div>

  </div>
</div>
